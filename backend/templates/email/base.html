{% set preheader = preheader|default('') %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject|default('JanSamadhan Notification')|e }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f3f4f6; font-family:Arial,Helvetica,sans-serif; color:#374151;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f3f4f6; width:100%; border-collapse:collapse;">
    <tr>
      <td align="center" style="background-color:#f3f4f6; padding: 20px 0;">
        <!--[if (mso)|(IE)]>
        <table role="presentation" width="600" align="center" border="0" cellpadding="0" cellspacing="0"><tr><td style="padding: 20px 0;">
        <![endif]-->
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background-color:#ffffff; border:1px solid #e5e7eb; width:100%; border-collapse:collapse; margin:0 auto;">
          {% if preheader %}
          <tr>
            <td style="display:none !important; mso-hide:all; max-height:0px; max-width:0px; opacity:0; overflow:hidden; font-size:0px; line-height:0px; height:0px;">
              {{ preheader|e }}
            </td>
          </tr>
          {% endif %}
          
          {% include "email/header.html" %}
          
          <tr>
            <td align="left" style="padding:30px; background-color:#ffffff; color:#374151; font-family:Arial,Helvetica,sans-serif; font-size:15px; line-height:1.6; word-break:break-word; overflow-wrap:break-word;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          
          {% include "email/footer.html" %}
        </table>
        <!--[if (mso)|(IE)]>
        </td></tr></table>
        <![endif]-->
      </td>
    </tr>
  </table>
</body>
</html>
