<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Submission Debug Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        .status {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            margin: 8px 0;
            display: inline-block;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .log-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin: 12px 0;
        }
        .test-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 8px 8px 8px 0;
        }
        .test-button:hover { background: #0056b3; }
        .test-button:disabled { background: #6c757d; cursor: not-allowed; }
        .form-group {
            margin: 16px 0;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .debug-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 16px;
            margin: 12px 0;
        }
        .debug-info h4 {
            margin-top: 0;
            color: #495057;
        }
    </style>
</head>
<body>
    <h1>🧪 JanSamadhan Complaint Submission Debug Tool</h1>
    
    <div class="test-section">
        <h2 class="test-title">🔍 System Diagnostics</h2>
        <button class="test-button" onclick="runDiagnostics()">Run Full Diagnostics</button>
        <button class="test-button" onclick="clearLogs()">Clear Logs</button>
        <div id="diagnostics-status"></div>
        <div id="diagnostics-output" class="log-output"></div>
    </div>

    <div class="test-section">
        <h2 class="test-title">🔐 Authentication Test</h2>
        <div class="grid">
            <div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="test-email" value="citizen@example.com" placeholder="Enter test email">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="test-password" value="CitizenSecure123!" placeholder="Enter test password">
                </div>
                <button class="test-button" onclick="testAuthentication()">Test Login</button>
                <button class="test-button" onclick="testTokenValidation()">Validate Token</button>
            </div>
            <div>
                <div id="auth-status"></div>
                <div id="auth-output" class="log-output"></div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2 class="test-title">📝 Complaint Submission Test</h2>
        <div class="grid">
            <div>
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="test-title" value="Test Pothole Complaint" placeholder="Complaint title (5-100 chars)">
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="test-category">
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="Water Supply">Water Supply</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Sanitation">Sanitation</option>
                        <option value="Transport">Transport</option>
                        <option value="Law & Order">Law & Order</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority:</label>
                    <select id="test-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="emergency">Emergency</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="test-description" placeholder="Detailed description (10-2000 chars)">There is a large pothole on Main Street that is causing traffic issues and needs immediate attention.</textarea>
                </div>
                <div class="form-group">
                    <label>Location:</label>
                    <input type="text" id="test-location" value="Main Street, Downtown" placeholder="Location address">
                </div>
                <div class="form-group">
                    <label>Region:</label>
                    <input type="text" id="test-region" value="Central District" placeholder="Region">
                </div>
                <div class="form-group">
                    <label>Latitude:</label>
                    <input type="number" id="test-latitude" value="19.0760" step="0.0001" placeholder="Latitude">
                </div>
                <div class="form-group">
                    <label>Longitude:</label>
                    <input type="number" id="test-longitude" value="72.8777" step="0.0001" placeholder="Longitude">
                </div>
                <button class="test-button" onclick="testComplaintSubmission()">Submit Test Complaint</button>
                <button class="test-button" onclick="testValidationOnly()">Test Validation Only</button>
            </div>
            <div>
                <div id="submission-status"></div>
                <div id="submission-output" class="log-output"></div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2 class="test-title">🌐 API Connectivity Test</h2>
        <button class="test-button" onclick="testAPIConnectivity()">Test API Connection</button>
        <button class="test-button" onclick="testDebugEndpoint()">Test Debug Endpoint</button>
        <button class="test-button" onclick="testRateLimiting()">Test Rate Limiting</button>
        <div id="api-status"></div>
        <div id="api-output" class="log-output"></div>
    </div>

    <div class="test-section">
        <h2 class="test-title">📊 Current System State</h2>
        <div id="system-state" class="debug-info">
            <h4>Authentication</h4>
            <div id="auth-state">Checking...</div>
            
            <h4>API Configuration</h4>
            <div id="api-state">Checking...</div>
            
            <h4>Browser Support</h4>
            <div id="browser-state">Checking...</div>
        </div>
    </div>

    <script>
        // API configuration
        const API_BASE_URL = (() => {
            if (!window.location.hostname || window.location.hostname === '') {
                return 'http://localhost:8000';
            }
            return `http://${window.location.hostname}:8000`;
        })();

        let authToken = null;

        // Utility functions
        function log(elementId, message, type = 'info') {
            const output = document.getElementById(elementId);
            if (output) {
                const timestamp = new Date().toLocaleTimeString();
                const color = type === 'error' ? '#ff6b6b' : type === 'success' ? '#51cf66' : type === 'warning' ? '#ffd43b' : '#74c0fc';
                output.innerHTML += `<div style="color: ${color};">[${timestamp}] ${message}</div>`;
                output.scrollTop = output.scrollHeight;
            }
        }

        function setStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="status ${type}">${message}</div>`;
            }
        }

        function clearLogs() {
            ['diagnostics-output', 'auth-output', 'submission-output', 'api-output'].forEach(id => {
                const element = document.getElementById(id);
                if (element) element.innerHTML = '';
            });
        }

        // System diagnostics
        async function runDiagnostics() {
            setStatus('diagnostics-status', 'Running diagnostics...', 'info');
            log('diagnostics-output', '🔍 Starting system diagnostics...', 'info');

            try {
                // Check browser compatibility
                log('diagnostics-output', `🌐 Browser: ${navigator.userAgent}`, 'info');
                log('diagnostics-output', `📍 Origin: ${window.location.origin}`, 'info');
                log('diagnostics-output', `🔗 API Base URL: ${API_BASE_URL}`, 'info');

                // Check localStorage/sessionStorage
                const hasLocalStorage = typeof(Storage) !== "undefined";
                log('diagnostics-output', `💾 Local Storage: ${hasLocalStorage ? 'Available' : 'Not Available'}`, hasLocalStorage ? 'success' : 'error');

                // Check fetch API
                const hasFetch = typeof fetch !== 'undefined';
                log('diagnostics-output', `🌐 Fetch API: ${hasFetch ? 'Available' : 'Not Available'}`, hasFetch ? 'success' : 'error');

                // Test basic connectivity
                try {
                    const response = await fetch(`${API_BASE_URL}/`, {
                        method: 'GET',
                        timeout: 5000
                    });
                    log('diagnostics-output', `🔗 Basic connectivity: ${response.status} ${response.statusText}`, 'success');
                } catch (error) {
                    log('diagnostics-output', `❌ Basic connectivity failed: ${error.message}`, 'error');
                }

                // Check authentication status
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                if (token) {
                    log('diagnostics-output', `🔐 Token found: ${token.substring(0, 20)}...`, 'success');
                } else {
                    log('diagnostics-output', '🔐 No authentication token found', 'warning');
                }

                setStatus('diagnostics-status', 'Diagnostics completed', 'success');
                log('diagnostics-output', '✅ Diagnostics completed successfully', 'success');

            } catch (error) {
                setStatus('diagnostics-status', `Diagnostics failed: ${error.message}`, 'error');
                log('diagnostics-output', `❌ Diagnostics error: ${error.message}`, 'error');
            }
        }

        // Authentication tests
        async function testAuthentication() {
            const email = document.getElementById('test-email').value;
            const password = document.getElementById('test-password').value;

            if (!email || !password) {
                setStatus('auth-status', 'Please enter email and password', 'warning');
                return;
            }

            setStatus('auth-status', 'Testing authentication...', 'info');
            log('auth-output', '🔐 Starting authentication test...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                log('auth-output', `📤 Login request sent: ${email}`, 'info');
                log('auth-output', `📥 Response status: ${response.status} ${response.statusText}`, 'info');

                const data = await response.json();

                if (response.ok) {
                    authToken = data.data?.token;
                    if (authToken) {
                        localStorage.setItem('token', authToken);
                        log('auth-output', `✅ Login successful! Token: ${authToken.substring(0, 20)}...`, 'success');
                        log('auth-output', `👤 User: ${data.data?.name} (${data.data?.role})`, 'success');
                        setStatus('auth-status', 'Authentication successful', 'success');
                    } else {
                        log('auth-output', '❌ No token in response', 'error');
                        setStatus('auth-status', 'Authentication failed - no token', 'error');
                    }
                } else {
                    log('auth-output', `❌ Login failed: ${data.detail || 'Unknown error'}`, 'error');
                    setStatus('auth-status', 'Authentication failed', 'error');
                }

            } catch (error) {
                log('auth-output', `❌ Authentication error: ${error.message}`, 'error');
                setStatus('auth-status', `Authentication error: ${error.message}`, 'error');
            }
        }

        async function testTokenValidation() {
            if (!authToken) {
                authToken = localStorage.getItem('token') || sessionStorage.getItem('token');
            }

            if (!authToken) {
                setStatus('auth-status', 'No token available - please login first', 'warning');
                return;
            }

            setStatus('auth-status', 'Validating token...', 'info');
            log('auth-output', '🔍 Starting token validation...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                log('auth-output', `📤 Token validation request sent`, 'info');
                log('auth-output', `📥 Response status: ${response.status} ${response.statusText}`, 'info');

                if (response.ok) {
                    const data = await response.json();
                    log('auth-output', `✅ Token valid! User: ${data.email} (${data.role})`, 'success');
                    setStatus('auth-status', 'Token validation successful', 'success');
                } else {
                    const error = await response.json();
                    log('auth-output', `❌ Token invalid: ${error.detail || 'Unknown error'}`, 'error');
                    setStatus('auth-status', 'Token validation failed', 'error');
                }

            } catch (error) {
                log('auth-output', `❌ Token validation error: ${error.message}`, 'error');
                setStatus('auth-status', `Token validation error: ${error.message}`, 'error');
            }
        }

        // Complaint submission tests
        async function testValidationOnly() {
            const complaintData = getComplaintFormData();
            
            setStatus('submission-status', 'Testing validation...', 'info');
            log('submission-output', '🔍 Starting validation test...', 'info');

            // Client-side validation
            const errors = validateComplaintData(complaintData);
            
            if (errors.length > 0) {
                log('submission-output', '❌ Client-side validation failed:', 'error');
                errors.forEach(error => log('submission-output', `  - ${error}`, 'error'));
                setStatus('submission-status', 'Validation failed', 'error');
                return;
            }

            log('submission-output', '✅ Client-side validation passed', 'success');
            
            // Server-side validation (without actually submitting)
            try {
                const response = await fetch(`${API_BASE_URL}/api/complaints/debug`, {
                    headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {}
                });

                if (response.ok) {
                    const debugData = await response.json();
                    log('submission-output', '✅ Server is ready for complaints', 'success');
                    log('submission-output', `📊 Valid categories: ${debugData.valid_categories?.join(', ')}`, 'info');
                    setStatus('submission-status', 'Validation test passed', 'success');
                } else {
                    log('submission-output', '❌ Server not ready for complaints', 'error');
                    setStatus('submission-status', 'Server validation failed', 'error');
                }

            } catch (error) {
                log('submission-output', `❌ Validation test error: ${error.message}`, 'error');
                setStatus('submission-status', 'Validation test error', 'error');
            }
        }

        async function testComplaintSubmission() {
            const complaintData = getComplaintFormData();
            
            if (!authToken) {
                setStatus('submission-status', 'Please authenticate first', 'warning');
                return;
            }

            setStatus('submission-status', 'Submitting complaint...', 'info');
            log('submission-output', '📝 Starting complaint submission test...', 'info');

            try {
                log('submission-output', '📤 Sending complaint data:', 'info');
                log('submission-output', JSON.stringify(complaintData, null, 2), 'info');

                const response = await fetch(`${API_BASE_URL}/api/complaints/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(complaintData)
                });

                log('submission-output', `📥 Response status: ${response.status} ${response.statusText}`, 'info');

                if (response.ok) {
                    const result = await response.json();
                    const complaintId = result.data?.id || result.data?._id;
                    
                    log('submission-output', '✅ Complaint submitted successfully!', 'success');
                    log('submission-output', `🎉 Complaint ID: ${complaintId}`, 'success');
                    log('submission-output', `📋 Status: ${result.data?.status}`, 'success');
                    log('submission-output', `📅 Created: ${result.data?.createdAt}`, 'success');
                    
                    if (result.data?.assigned_officer) {
                        log('submission-output', `👮 Assigned to: ${result.data.assigned_officer}`, 'success');
                    }
                    
                    setStatus('submission-status', `Complaint submitted! ID: ${complaintId}`, 'success');
                    
                } else {
                    const errorText = await response.text();
                    let errorMessage = 'Submission failed';
                    
                    try {
                        const errorData = JSON.parse(errorText);
                        errorMessage = errorData.detail || errorData.message || errorText;
                    } catch (e) {
                        errorMessage = `Server error: ${response.status} ${response.statusText}`;
                    }
                    
                    log('submission-output', `❌ Submission failed: ${errorMessage}`, 'error');
                    log('submission-output', `📄 Error response: ${errorText}`, 'error');
                    setStatus('submission-status', `Submission failed: ${errorMessage}`, 'error');
                }

            } catch (error) {
                log('submission-output', `❌ Submission error: ${error.message}`, 'error');
                setStatus('submission-status', `Submission error: ${error.message}`, 'error');
            }
        }

        // API connectivity tests
        async function testAPIConnectivity() {
            setStatus('api-status', 'Testing API connectivity...', 'info');
            log('api-output', '🌐 Starting API connectivity test...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/`, {
                    method: 'GET',
                    timeout: 10000
                });

                log('api-output', `📥 Root endpoint: ${response.status} ${response.statusText}`, 'info');
                
                if (response.ok) {
                    log('api-output', '✅ API server is running', 'success');
                    setStatus('api-status', 'API connectivity OK', 'success');
                } else {
                    log('api-output', '⚠️ API server responded with error', 'warning');
                    setStatus('api-status', 'API server error', 'warning');
                }

            } catch (error) {
                log('api-output', `❌ API connectivity failed: ${error.message}`, 'error');
                setStatus('api-status', 'API connectivity failed', 'error');
            }
        }

        async function testDebugEndpoint() {
            setStatus('api-status', 'Testing debug endpoint...', 'info');
            log('api-output', '🧪 Testing debug endpoint...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/api/complaints/debug`, {
                    headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {}
                });

                log('api-output', `📥 Debug endpoint: ${response.status} ${response.statusText}`, 'info');

                if (response.ok) {
                    const data = await response.json();
                    log('api-output', '✅ Debug endpoint working', 'success');
                    log('api-output', `💾 Database connected: ${data.database_connected}`, 'success');
                    log('api-output', `📊 Complaints count: ${data.complaints_count}`, 'info');
                    log('api-output', `👥 Users count: ${data.users_count}`, 'info');
                    log('api-output', `🏷️ Valid categories: ${data.valid_categories?.join(', ')}`, 'info');
                    setStatus('api-status', 'Debug endpoint OK', 'success');
                } else {
                    log('api-output', '❌ Debug endpoint failed', 'error');
                    setStatus('api-status', 'Debug endpoint failed', 'error');
                }

            } catch (error) {
                log('api-output', `❌ Debug endpoint error: ${error.message}`, 'error');
                setStatus('api-status', 'Debug endpoint error', 'error');
            }
        }

        async function testRateLimiting() {
            setStatus('api-status', 'Testing rate limiting...', 'info');
            log('api-output', '⏱️ Testing rate limiting (5 requests)...', 'info');

            let successCount = 0;
            let rateLimited = false;

            for (let i = 1; i <= 6; i++) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/complaints/debug`, {
                        headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {}
                    });

                    log('api-output', `Request ${i}: ${response.status} ${response.statusText}`, 
                        response.status === 200 ? 'success' : 'warning');

                    if (response.status === 200) {
                        successCount++;
                    } else if (response.status === 429) {
                        rateLimited = true;
                        log('api-output', '⚠️ Rate limited after 5 requests', 'warning');
                        break;
                    }

                    // Small delay between requests
                    await new Promise(resolve => setTimeout(resolve, 100));

                } catch (error) {
                    log('api-output', `Request ${i} error: ${error.message}`, 'error');
                }
            }

            if (rateLimited) {
                log('api-output', '✅ Rate limiting is working correctly', 'success');
                setStatus('api-status', 'Rate limiting test passed', 'success');
            } else {
                log('api-output', `⚠️ Made ${successCount} requests without rate limiting`, 'warning');
                setStatus('api-status', 'Rate limiting test unclear', 'warning');
            }
        }

        // Helper functions
        function getComplaintFormData() {
            return {
                title: document.getElementById('test-title').value,
                category: document.getElementById('test-category').value,
                subcategory: '',
                priority: document.getElementById('test-priority').value,
                description: document.getElementById('test-description').value,
                location: document.getElementById('test-location').value,
                region: document.getElementById('test-region').value,
                latitude: parseFloat(document.getElementById('test-latitude').value),
                longitude: parseFloat(document.getElementById('test-longitude').value),
                media: []
            };
        }

        function validateComplaintData(data) {
            const errors = [];

            if (!data.title || data.title.length < 5) {
                errors.push('Title must be at least 5 characters');
            }
            if (data.title.length > 100) {
                errors.push('Title must be less than 100 characters');
            }
            if (!data.description || data.description.length < 10) {
                errors.push('Description must be at least 10 characters');
            }
            if (data.description.length > 2000) {
                errors.push('Description must be less than 2000 characters');
            }
            if (!data.category) {
                errors.push('Category is required');
            }
            if (!data.location || data.location.length < 5) {
                errors.push('Location must be at least 5 characters');
            }
            if (!data.region) {
                errors.push('Region is required');
            }
            if (!data.latitude || !data.longitude) {
                errors.push('Latitude and longitude are required');
            }

            return errors;
        }

        // Initialize system state display
        function updateSystemState() {
            // Authentication state
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('js_user') || sessionStorage.getItem('js_user') || '{}');
            
            document.getElementById('auth-state').innerHTML = `
                <div>Token: ${token ? 'Present' : 'Missing'}</div>
                <div>User: ${user.email || 'Not logged in'}</div>
                <div>Role: ${user.role || 'Unknown'}</div>
            `;

            // API state
            document.getElementById('api-state').innerHTML = `
                <div>Base URL: ${API_BASE_URL}</div>
                <div>Origin: ${window.location.origin}</div>
                <div>Protocol: ${window.location.protocol}</div>
            `;

            // Browser state
            document.getElementById('browser-state').innerHTML = `
                <div>Browser: ${navigator.userAgent.split(' ')[0]}</div>
                <div>Local Storage: ${typeof(Storage) !== "undefined" ? 'Available' : 'Not Available'}</div>
                <div>Fetch API: ${typeof fetch !== 'undefined' ? 'Available' : 'Not Available'}</div>
            `;
        }

        // Auto-run diagnostics on load
        document.addEventListener('DOMContentLoaded', () => {
            updateSystemState();
            setTimeout(() => runDiagnostics(), 1000);
        });
    </script>
</body>
</html>
