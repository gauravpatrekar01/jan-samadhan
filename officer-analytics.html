<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officer Dashboard - Advanced Analytics | JanSamadhan</title>
  <meta name="description" content="Performance metrics, priority queue, and regional analytics for field officers">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍💼</text></svg>">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/analytics-dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="JanSamadhanLogo.png" alt="Logo" class="logo-img-sm">
      <div>
        <div class="nav-title">JanSamadhan</div>
        <div class="nav-tagline">Field Officer Dashboard</div>
      </div>
    </div>
    <div class="nav-links">
      <a href="officer.html">📊 Dashboard</a>
      <a href="#" class="active">📈 Analytics</a>
    </div>
    <div class="nav-actions">
      <button class="dark-toggle" onclick="toggleDark()">🌙</button>
      <button class="btn btn-ghost btn-sm" onclick="window.location.href='index.html'">Logout</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container" style="padding: 32px 0; margin-bottom: 40px;">
    <!-- Header -->
    <div class="page-header" style="margin-bottom: 32px">
      <h1 class="page-title">📈 Performance Analytics</h1>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
        <button class="btn btn-sm btn-outline" id="refreshBtn">🔄 Refresh</button>
        <button class="btn btn-sm btn-ghost" id="exportBtn">📥 Export</button>
        <label style="display: flex; align-items: center; gap: 8px; margin: 0;">
          <input type="checkbox" id="autoRefreshToggle" checked>
          <span style="font-size: 0.9rem;">Auto-refresh</span>
        </label>
      </div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom: 32px">
      <div style="font-weight: 700; margin-bottom: 16px;">⏰ Date Range Filter</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
        <div>
          <label style="font-size: 0.85rem; font-weight: 600;">From:</label>
          <input type="date" class="form-control" style="max-width: 200px" id="filterDateStart">
        </div>
        <div>
          <label style="font-size: 0.85rem; font-weight: 600; margin-left: 10px;">To:</label>
          <input type="date" class="form-control" style="max-width: 200px" id="filterDateEnd">
        </div>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="stats-grid">
      <div class="stat-card" id="kpiAssigned">
        <div class="stat-icon">📋</div>
        <div class="stat-value">0</div>
        <div class="stat-label">Total Assigned</div>
      </div>
      <div class="stat-card" id="kpiResolved">
        <div class="stat-icon" style="background: rgba(22,163,74,.1); color: #16a34a;">✅</div>
        <div class="stat-value" style="color: #16a34a;">0</div>
        <div class="stat-label">Resolved</div>
      </div>
      <div class="stat-card" id="kpiResolutionRate">
        <div class="stat-icon" style="background: rgba(37,99,235,.1); color: #2563eb;">📊</div>
        <div class="stat-value" style="color: #2563eb;">0%</div>
        <div class="stat-label">Resolution Rate</div>
      </div>
      <div class="stat-card" id="kpiEfficiency">
        <div class="stat-icon" style="background: rgba(217,119,6,.1); color: #d97706;">⚡</div>
        <div class="stat-value" style="color: #d97706;">0</div>
        <div class="stat-label">Efficiency Score</div>
      </div>
      <div class="stat-card" id="kpiAvgRating">
        <div class="stat-icon" style="background: rgba(249,115,22,.1); color: #f97316;">⭐</div>
        <div class="stat-value" style="color: #f97316;">0.0★</div>
        <div class="stat-label">Avg Rating</div>
      </div>
      <div class="stat-card" id="kpiAvgTime">
        <div class="stat-icon">⏱️</div>
        <div class="stat-value">0h</div>
        <div class="stat-label">Avg Resolution Time</div>
      </div>
    </div>

    <!-- Priority Queue Section -->
    <div class="card" style="margin-bottom: 32px;">
      <h3 style="margin-bottom: 20px; color: var(--text);">🚨 Priority Queue</h3>
      <div id="queueContainer" style="display: flex; flex-direction: column; gap: 12px;">
        <div style="text-align: center; padding: 40px; color: var(--text-muted);">
          Loading priority queue...
        </div>
      </div>
    </div>

    <!-- Charts Grid -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3 class="chart-title">📊 Priority Distribution</h3>
        <div class="chart-wrap">
          <canvas id="priorityChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/advanced-analytics.js"></script>
  <script>
    // Initialize analytics on page load
    document.addEventListener('DOMContentLoaded', async () => {
      // Get user ID from session/localStorage
      const userEmail = localStorage.getItem('userEmail') || sessionStorage.getItem('userEmail');
      const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

      if (!userId) {
        window.location.href = 'officer.html';
        return;
      }

      // Initialize analytics
      await initAdvancedAnalytics({
        apiBase: '/api',
        userRole: 'officer',
        userId: userId,
        refreshInterval: 30000 // 30 seconds
      });

      showToast('📈 Analytics loaded successfully', 'success');
    });
  </script>
</body>

</html>
