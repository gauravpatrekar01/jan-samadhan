version: '3.8'

services:
  db:
    image: postgres:15
    container_name: jansamadhan-db
    environment:
      POSTGRES_DB: jansamadhan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: jansamadhan-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=jansamadhan
      - DB_USER=postgres
      - DB_PASSWORD=password
    depends_on:
      - db

volumes:
  postgres_data:
